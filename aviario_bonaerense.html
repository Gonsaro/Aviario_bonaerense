.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:9999;align-items:center;justify-content:center;cursor:zoom-out}
.lb.open{display:flex}
.lb img{max-width:90vw;max-height:90vh;object-fit:contain;image-rendering:pixelated;image-rendering:crisp-edges;border-radius:4px}
.lb-close{position:fixed;top:1rem;right:1.25rem;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;line-height:1}
.lb-content{display:flex;flex-direction:column;align-items:center;gap:12px;cursor:zoom-out}
.lb-label{font-size:13px;color:rgba(255,255,255,0.7);letter-spacing:0.5px;text-transform:capitalize}
.lb-nav{position:fixed;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.12);border:none;color:#fff;font-size:24px;cursor:pointer;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background 0.15s;z-index:10000}

.lb-nav:disabled{opacity:0.2;cursor:default}
.lb-prev{left:1.25rem}
.lb-next{right:1.25rem}
.empty{padding:2rem 1.5rem;color:#888780;font-size:14px}
</style>
</head>
<body>
<div class="header">
  <div class="logo">Aviar<span>io</span> <span style="font-size:13px;font-weight:400;color:#888780">Buenos Aires</span></div>
  <div class="subtitle" id="subtitle">14 especies</div>
</div>
<div class="toolbar">
  <input type="text" id="search" placeholder="Buscar por nombre, familia u orden…" oninput="render()">
  <span class="sort-lbl">Ordenar:</span>
  <select id="sort" onchange="render()">
    <option value="num">Nº de especie</option>
    <option value="nombre">Nombre común A–Z</option>
    <option value="cientifico">Nombre científico A–Z</option>
  </select>
</div>
<div id="app"></div>
<div class="lb" id="lb">
  <button class="lb-close" onclick="closeLb()">&#10005;</button>
  <button class="lb-nav lb-prev" id="lb-prev" onclick="lbNav(-1)">&#8592;</button>
  <div class="lb-content" onclick="closeLb()">
    <div style="position:relative;display:inline-flex">
      <img id="lb-img" src="" alt="sprite ampliado">
      <span id="lb-sex" style="position:absolute;top:8px;right:10px;font-size:22px;font-weight:700;color:#333;text-shadow:0 0 4px #fff,0 0 4px #fff;pointer-events:none"></span>
    </div>
    <div class="lb-label" id="lb-label"></div>
  </div>
  <button class="lb-nav lb-next" id="lb-next" onclick="lbNav(1)">&#8594;</button>
</div>

const birds=[
{id:1,num:"#001",nombre_comun:"Hornero",nombre_cientifico:"Furnarius rufus",familia:"Furnariidae",orden:"Passeriformes",descripcion:{adulto:"Ave mediana y robusta. Cabeza parda con una ceja más clara. Dorso, alas y nuca pardo-rojizos. Cola y rabadilla de un rufo intenso y brillante. Garganta blancuzca que se funde con un pecho y vientre color ante pálido. Flancos algo más oscuros. Pico mediano casi recto. Patas grisáceas."},habitat:["urbano","pastizal","agrícola","ribereño"],residencia:"permanente",tamanio:"chico",largo_cm:19,envergadura_cm:null,estado:"LC",provincias:["Buenos Aires","CABA","Santa Fe","Entre Ríos","Corrientes","Misiones","Chaco","Formosa","Santiago del Estero","Córdoba","La Pampa","Mendoza","San Luis","Tucumán","Salta","Jujuy","Catamarca","La Rioja","San Juan","Neuquén","Río Negro"],curiosidades:"Ave nacional argentina. Construye nidos de barro y paja con forma de horno de entre 20 y 30 cm de diámetro. La pareja casi nunca reutiliza el mismo nido, dejándolo disponible como refugio para otras aves y animales. Se alimenta principalmente de insectos que recoge caminando por el suelo.",sprites:{adulto:"Furnarius_rufus_D"},audio_ebird_code:"rufhor2"},
{id:2,num:"#002",nombre_comun:"Tero",nombre_cientifico:"Vanellus chilensis",familia:"Charadriidae",orden:"Charadriiformes",descripcion:{adulto:"Ave mediana y llamativa. Cabeza gris con frente negra y una cresta fina y negra que cae hacia atrás. Banda ancha negra en el pecho. Dorso y alas pardo-grisáceos con un brillo bronceado y reflejos violáceos. Vientre blanco. Pico rojo-anaranjado con punta negra. Ojo rojo intenso con cera roja. Patas rojo oscuras. Posee espolones en las alas."},habitat:["pastizal","urbano","agrícola","ribereño","costa","humedal"],residencia:"permanente",tamanio:"mediano",largo_cm:33,envergadura_cm:75,estado:"LC",provincias:["Buenos Aires","CABA","Santa Fe","Entre Ríos","Corrientes","Misiones","Chaco","Formosa","Santiago del Estero","Córdoba","La Pampa","Mendoza","San Luis","Tucumán","Salta","Jujuy","Catamarca","La Rioja","San Juan","Neuquén","Río Negro","Chubut","Santa Cruz","Tierra del Fuego"],curiosidades:"Uno de los pájaros más territoriales y ruidosos de la región. Defiende su nido con vuelos rasantes y llamadas estridentes contra cualquier intruso. Posee espolones en las alas que usa como arma. Se ha adaptado muy bien a ambientes urbanos.",sprites:{adulto:"Vanellus_chilensis_D"},audio_ebird_code:"soulap1"},
{id:3,num:"#003",nombre_comun:"Cotorra",nombre_cientifico:"Myiopsitta monachus",familia:"Psittacidae",orden:"Psittaciformes",descripcion:{adulto:"Ave mediana y compacta. Frente, cara, garganta y pecho gris claro. Corona, dorso, rabadilla y cola verdes. Alas verde opaco con primarias y secundarias azules llamativas. Cola larga y escalonada. Pico grueso y redondeado, amarillo-marrón. Ojo pardo oscuro. Patas grisáceas. Sexos similares."},habitat:["urbano","pastizal","agrícola","monte","bosque"],residencia:"permanente",tamanio:"chico",largo_cm:29,envergadura_cm:53,estado:"LC",provincias:["Buenos Aires","CABA","Santa Fe","Entre Ríos","Corrientes","Misiones","Chaco","Formosa","Santiago del Estero","Córdoba","La Pampa","Mendoza","San Luis","Tucumán","Salta","Jujuy","Catamarca","La Rioja","San Juan","Neuquén","Río Negro"],curiosidades:"Es el único loro del mundo que construye nidos comunales de palitos, a veces enormes, que comparte con toda la colonia durante todo el año. Se ha naturalizado en numerosas ciudades de Europa y América del Norte gracias al comercio de mascotas.",sprites:{adulto:"Myiopsitta_monachus_D"},audio_ebird_code:"monpar"},
{id:4,num:"#004",nombre_comun:"Paloma doméstica",nombre_cientifico:"Columba livia",familia:"Columbidae",orden:"Columbiformes",descripcion:{adulto:"Ave mediana y robusta de silueta compacta. Cabeza pequeña gris azulada con irisaciones verdes y violáceas en el cuello. Dorso gris con dos barras alares negras bien visibles. Pecho gris con irisaciones. Vientre gris pálido. Cola gris con banda terminal negra. Pico fino, gris con cera blanca en la base. Patas rojas. El plumaje es muy variable en poblaciones ferales: existen individuos blancos, negros, pardos y mezclados."},habitat:["urbano","agrícola"],residencia:"permanente",tamanio:"mediano",largo_cm:32,envergadura_cm:64,estado:"LC",provincias:["Buenos Aires","CABA","Santa Fe","Entre Ríos","Corrientes","Misiones","Chaco","Formosa","Santiago del Estero","Córdoba","La Pampa","Mendoza","San Luis","Tucumán","Salta","Jujuy","Catamarca","La Rioja","San Juan","Neuquén","Río Negro"],curiosidades:"Especie introducida, descendiente de la paloma bravía doméstica. Vive en ciudades de todo el mundo y puede orientarse usando el campo magnético terrestre y referencias visuales. Fue la primera ave domesticada por el ser humano, hace más de 5.000 años.",sprites:{adulto:"Columba_livia_D"},audio_ebird_code:"rocpig"},
{id:5,num:"#005",nombre_comun:"Tordo renegrido",nombre_cientifico:"Molothrus bonariensis",familia:"Icteridae",orden:"Passeriformes",descripcion:{macho:"Ave mediana. Plumaje enteramente negro azulado con brillo iridiscente azul-violáceo intenso. Pico corto y cónico oscuro. Ojo oscuro. Patas gris pálido. Cola larga.",hembra:"Plumaje pardo-grisáceo uniforme, ligeramente más pálido en las partes inferiores. Pico corto y cónico oscuro. Ojo oscuro. Patas gris pálido. Cola larga."},habitat:["urbano","pastizal","agrícola","ribereño"],residencia:"permanente",tamanio:"chico",largo_cm:19,envergadura_cm:null,estado:"LC",provincias:["Buenos Aires","CABA","Santa Fe","Entre Ríos","Corrientes","Misiones","Chaco","Formosa","Santiago del Estero","Córdoba","La Pampa","Mendoza","San Luis","Tucumán","Salta","Jujuy","Catamarca","La Rioja","San Juan","Neuquén","Río Negro"],curiosidades:"Es un pájaro parásito de nidada: pone sus huevos en los nidos de otras especies para que las críen. No construye nido propio. Una hembra puede poner hasta 40 huevos por temporada en distintos nidos.",sprites:{macho:"Molothrus_bonariensis_M",hembra:"Molothrus_bonariensis_F"},audio_ebird_code:"shicow"},
{id:6,num:"#006",nombre_comun:"Zorzal colorado",nombre_cientifico:"Turdus rufiventris",familia:"Turdidae",orden:"Passeriformes",descripcion:{adulto:"Ave mediana y robusta. Cabeza, dorso y alas pardo oliva oscuro uniforme. Pecho y vientre naranja-rufo brillante y llamativo. Cola parda larga. Pico amarillo-anaranjado. Anillo ocular amarillo pálido. Patas oscuras."},habitat:["urbano","bosque","monte","pastizal"],residencia:"permanente",tamanio:"mediano",largo_cm:25,envergadura_cm:null,estado:"LC",provincias:["Buenos Aires","CABA","Santa Fe","Entre Ríos","Corrientes","Misiones","Chaco","Formosa","Santiago del Estero","Córdoba","La Pampa","Mendoza","San Luis","Tucumán","Salta","Jujuy","Catamarca","La Rioja","San Juan","Neuquén","Río Negro"],curiosidades:"Canta especialmente al amanecer y al atardecer con un silbido melodioso y variado. Se alimenta de frutos, lombrices e insectos que busca en el suelo entre hojas caídas. Es muy común en parques y jardines urbanos.",sprites:{adulto:"Turdus_rufiventris_D"},audio_ebird_code:"rufbel1"},
{id:7,num:"#007",nombre_comun:"Gorrión",nombre_cientifico:"Passer domesticus",familia:"Passeridae",orden:"Passeriformes",descripcion:{macho:"Ave chica y rechoncha. Corona gris con franjas castaño-rojizas en los lados. Cara gris con una mancha negra en la garganta y pecho que varía según la estación. Dorso castaño con rayas negras. Alas pardas con una barra alar blanca. Vientre gris pálido. Pico corto y cónico, oscuro en época reproductiva y más claro fuera de ella. Patas rosadas.",hembra:"Más apagada. Sin el negro en la garganta. Ceja ante pálida bien marcada. Dorso pardo rayado. Pico más claro. Patas rosadas."},habitat:["urbano","agrícola"],residencia:"permanente",tamanio:"chico",largo_cm:15,envergadura_cm:24,estado:"LC",provincias:["Buenos Aires","CABA","Santa Fe","Entre Ríos","Corrientes","Misiones","Chaco","Formosa","Santiago del Estero","Córdoba","La Pampa","Mendoza","San Luis","Tucumán","Salta","Jujuy","Catamarca","La Rioja","San Juan","Neuquén","Río Negro"],curiosidades:"Especie introducida desde Europa en el siglo XIX. Es una de las aves más distribuidas del mundo gracias a su asociación con los asentamientos humanos. Los machos con mayor mancha negra en el pecho tienen mayor éxito reproductivo.",sprites:{macho:"Passer_domesticus_M",hembra:"Passer_domesticus_F"},audio_ebird_code:"houspa"},
{id:8,num:"#008",nombre_comun:"Benteveo",nombre_cientifico:"Pitangus sulphuratus",familia:"Tyrannidae",orden:"Passeriformes",descripcion:{adulto:"Ave mediana y llamativa. Corona negra con una mancha amarilla central oculta que se muestra cuando se excita. Ceja blanca ancha y máscara facial negra muy contrastante. Garganta blanca. Partes inferiores amarillo brillante. Dorso y alas pardo-rufo con bordes claros en las plumas. Cola parda con bordes rufos. Pico largo y robusto, negro. Patas oscuras."},habitat:["urbano","ribereño","humedal","pastizal","bosque"],residencia:"permanente",tamanio:"mediano",largo_cm:24,envergadura_cm:null,estado:"LC",provincias:["Buenos Aires","CABA","Santa Fe","Entre Ríos","Corrientes","Misiones","Chaco","Formosa","Santiago del Estero","Córdoba","La Pampa","Mendoza","San Luis","Tucumán","Salta","Jujuy","Catamarca","La Rioja","San Juan","Neuquén","Río Negro"],curiosidades:"Su nombre imita su canto característico. Es uno de los tiránidos más grandes y agresivos, capaz de atacar aves mucho más grandes para defender su territorio. Se alimenta de insectos, frutos, pequeños peces y hasta carroña.",sprites:{adulto:"Pitangus_sulphuratus_D"},audio_ebird_code:"grbkis1"},
{id:9,num:"#009",nombre_comun:"Calandria",nombre_cientifico:"Mimus saturninus",familia:"Mimidae",orden:"Passeriformes",descripcion:{adulto:"Ave mediana y esbelta de postura erguida. Ceja blanca bien marcada sobre una línea ocular oscura. Corona y partes superiores pardo-grisáceas. Alas con dos barras blancas visibles y bordes claros en las plumas secundarias. Cola larga con plumas externas de puntas blancas. Partes inferiores blanco-ante pálido, más cálido en el pecho y flancos. Pico mediano, fino y levemente curvado, oscuro. Patas largas y grises."},habitat:["urbano","pastizal","agrícola","monte"],residencia:"permanente",tamanio:"mediano",largo_cm:25,envergadura_cm:null,estado:"LC",provincias:["Buenos Aires","CABA","Santa Fe","Entre Ríos","Corrientes","Chaco","Formosa","Santiago del Estero","Córdoba","La Pampa","Mendoza","San Luis","Tucumán","Salta","Jujuy","Catamarca","La Rioja","San Juan","Neuquén","Río Negro"],curiosidades:"Es uno de los mejores imitadores de cantos del país, capaz de reproducir los sonidos de docenas de otras especies. Canta con persistencia durante casi todo el año, incluso de noche. Suele cantar desde lo alto de un arbusto o poste.",sprites:{adulto:"Mimus_saturninus_D"},audio_ebird_code:"chamon1"},
{id:10,num:"#010",nombre_comun:"Golondrina doméstica",nombre_cientifico:"Progne chalybea",familia:"Hirundinidae",orden:"Passeriformes",descripcion:{macho:"Ave mediana y aerodinámica. Partes superiores, corona y cara azul-púrpura oscuro con brillo iridiscente intenso. Partes inferiores blanco limpio. Cola corta y levemente ahorquillada. Pico corto y ancho. Ojo oscuro.",hembra:"Similar al macho pero con las partes superiores azul-gris apagado y tono parduzco en la cabeza y cara. Partes inferiores gris-blancuzco con leve estriado en el pecho."},habitat:["aéreo","urbano","ribereño","humedal"],residencia:"estival",tamanio:"chico",largo_cm:18,envergadura_cm:null,estado:"LC",provincias:["Buenos Aires","CABA","Santa Fe","Entre Ríos","Corrientes","Misiones","Chaco","Formosa","Santiago del Estero","Córdoba","La Pampa","Mendoza","San Luis","Tucumán","Salta","Jujuy","Catamarca","La Rioja","San Juan","Neuquén","Río Negro","Chubut"],curiosidades:"Migra desde América del Norte cada año para pasar el verano austral en Argentina. Pasa la mayor parte de su vida en vuelo cazando insectos. Suele anidar en colonias bajo aleros y puentes.",sprites:{macho:"Progne_chalybea_M",hembra:"Progne_chalybea_F",vuelo:"Progne_chalybea_V"},audio_ebird_code:"grpmar2"},
{id:11,num:"#011",nombre_comun:"Garza blanca",nombre_cientifico:"Ardea alba",familia:"Ardeidae",orden:"Pelecaniformes",descripcion:{adulto:"Ave alta y esbelta, enteramente blanca. Pico largo y amarillo, patas largas y negras. En vuelo el cuello se recoge en forma de S y las patas sobrepasan la cola. Alas anchas y vuelo lento y pausado.",reproductivo:"Igual que el plumaje anterior pero con la región alrededor del ojo de color verde brillante y largas plumas ornamentales sobre el dorso."},habitat:["humedal","ribereño","costa","pastizal","agrícola"],residencia:"permanente",tamanio:"grande",largo_cm:95,envergadura_cm:150,estado:"LC",provincias:["Buenos Aires","CABA","Santa Fe","Entre Ríos","Corrientes","Misiones","Chaco","Formosa","Córdoba","La Pampa","Mendoza","Tucumán","Salta","Jujuy","Neuquén","Río Negro","Chubut","Santa Cruz"],curiosidades:"Es una de las aves acuáticas más distribuidas del mundo. A fines del siglo XIX estuvo al borde de la extinción por la caza masiva de sus plumas nupciales. Caza inmóvil, esperando que el pez se acerque antes de asestar un golpe de pico fulminante.",sprites:{adulto:"Ardea_alba_D",reproductivo:"Ardea_alba_R",vuelo:"Ardea_alba_V"},audio_ebird_code:"greegr"},
{id:12,num:"#012",nombre_comun:"Garza mora",nombre_cientifico:"Ardea cocoi",familia:"Ardeidae",orden:"Pelecaniformes",descripcion:{adulto:"Ave muy alta y esbelta. Corona gris-azulada oscura, cara y cuello blancos. Cuello blanco con estriado negro fino en la parte delantera. Pico largo amarillo uniforme. Ojo amarillo. Dorso y alas azul-gris uniforme. Gran mancha negra en el flanco. Patas gris-verdoso oscuro.",reproductivo:"Similar al no reproductivo pero con corona negra bien definida, dos largas plumas negras cayendo de la nuca, pico naranja-rosado intenso, penacho escapular negro visible sobre el hombro, plumas ornamentales blancas en el pecho y patas rosado-salmón."},habitat:["humedal","ribereño","costa","pastizal"],residencia:"permanente",tamanio:"grande",largo_cm:110,envergadura_cm:180,estado:"LC",provincias:["Buenos Aires","CABA","Santa Fe","Entre Ríos","Corrientes","Misiones","Chaco","Formosa","Santiago del Estero","Córdoba","La Pampa","Mendoza","Tucumán","Salta","Jujuy","Neuquén","Río Negro","Chubut"],curiosidades:"Es la garza más grande de Sudamérica. Caza solitaria, generalmente inmóvil a la orilla del agua esperando que el pez se acerque. A pesar de su gran tamaño es un volador elegante con el cuello recogido en S característico de las garzas.",sprites:{adulto:"Ardea_cocoi_D",reproductivo:"Ardea_cocoi_R"},audio_ebird_code:"cocher1"},
{id:13,num:"#013",nombre_comun:"Martín pescador",nombre_cientifico:"Megaceryle torquata",familia:"Alcedinidae",orden:"Coraciiformes",descripcion:{macho:"Ave grande y robusta con cresta erizada azul-grisácea muy llamativa. Partes superiores azul-gris con manchas blancas dispersas. Collar blanco en la garganta. Pecho y vientre castaño-rufo intenso sin interrupción. Pico largo, robusto y oscuro con base amarillenta. Ojo pardo.",hembra:"Similar al macho pero con una banda pectoral azul-grisácea que separa la garganta blanca del vientre rufo."},habitat:["ribereño","humedal","costa"],residencia:"permanente",tamanio:"mediano",largo_cm:40,envergadura_cm:null,estado:"LC",provincias:["Buenos Aires","CABA","Santa Fe","Entre Ríos","Corrientes","Misiones","Chaco","Formosa","Santiago del Estero","Córdoba","La Pampa","Mendoza","Tucumán","Salta","Jujuy","Neuquén","Río Negro","Chubut"],curiosidades:"Caza en picada desde una percha elevada sobre el agua, sumergiéndose completamente para atrapar peces. Su vuelo es rápido y directo, con aleteos rápidos alternados con planeos breves. Es el martín pescador más grande de Argentina.",sprites:{macho:"Megaceryle_torquata_M",hembra:"Megaceryle_torquata_F"},audio_ebird_code:"rinkif1"},
{id:14,num:"#014",nombre_comun:"Macá común",nombre_cientifico:"Rollandia rolland",familia:"Podicipedidae",orden:"Podicipediformes",descripcion:{adulto:"Ave acuática pequeña y rechoncha. Cabeza y cuello negro brillante con llamativo penacho facial blanco estriado a los lados de la cara. Ojo rojo intenso. Pico corto y recto oscuro. Dorso pardo oscuro, flancos y parte del vientre canela-anaranjado cálido con escamado oscuro. Nada con el cuerpo muy bajo en el agua. Los pies lobulados son visibles bajo la superficie."},habitat:["humedal","ribereño","laguna"],residencia:"permanente",tamanio:"chico",largo_cm:28,envergadura_cm:null,estado:"LC",provincias:["Buenos Aires","CABA","Santa Fe","Entre Ríos","Corrientes","Chaco","Formosa","Córdoba","La Pampa","Mendoza","San Luis","Tucumán","Salta","Jujuy","Neuquén","Río Negro","Chubut","Santa Cruz","Tierra del Fuego"],curiosidades:"Endémica de Sudamérica. Raramente vuela y prefiere escapar zambulléndose. Sus patas están tan hacia atrás del cuerpo que casi no puede caminar en tierra. Los polluelos nacen cubiertos de plumón y los padres los llevan sobre el lomo.",sprites:{adulto:"Rollandia_rolland_D"},audio_ebird_code:"whtteg1"},
{id:15,num:"#015",nombre_comun:"Biguá",nombre_cientifico:"Nannopterum brasilianus",familia:"Phalacrocoracidae",orden:"Suliformes",descripcion:{adulto:"Ave grande y oscura. Plumaje negro con brillo azulado y patrón escamado sutil en alas y dorso. Piel facial desnuda naranja-amarilla en la base del pico. Ojo verde-turquesa. Pico largo y ganchudo oscuro. Cuello largo sostenido en curva característica. Cola larga y redondeada. Patas y pies palmeados negros."},habitat:["humedal","ribereño","costa"],residencia:"permanente",tamanio:"grande",largo_cm:70,envergadura_cm:110,estado:"LC",provincias:["Buenos Aires","CABA","Santa Fe","Entre Ríos","Corrientes","Misiones","Chaco","Formosa","Santiago del Estero","Córdoba","La Pampa","Mendoza","Tucumán","Salta","Jujuy","Neuquén","Río Negro","Chubut","Santa Cruz","Tierra del Fuego"],curiosidades:"A diferencia de la mayoría de las aves acuáticas sus plumas no son impermeables, por lo que debe secar las alas al sol con los brazos abiertos luego de bucear. Es un buceador experto que puede alcanzar varios metros de profundidad para atrapar peces.",sprites:{adulto:"Nannopterum_brasilianus_D"},audio_ebird_code:"neocor2"},
{id:16,num:"#016",nombre_comun:"Gallareta ligas rojas",nombre_cientifico:"Fulica armillata",familia:"Rallidae",orden:"Gruiformes",descripcion:{adulto:"Ave acuática grande y rechoncha. Cuerpo pizarra oscuro, cabeza y cuello negros. Pico amarillo brillante con escudo frontal rojo en la base. Ojo rojo. Patas largas amarillo-anaranjadas con dedos lobulados grises. Pequeña mancha blanca bajo la cola."},habitat:["humedal","laguna","ribereño"],residencia:"permanente",tamanio:"mediano",largo_cm:43,envergadura_cm:null,estado:"LC",provincias:["Buenos Aires","CABA","Santa Fe","Entre Ríos","Corrientes","Chaco","Córdoba","La Pampa","Mendoza","San Luis","Tucumán","Salta","Neuquén","Río Negro","Chubut","Santa Cruz","Tierra del Fuego"],curiosidades:"Su nombre viene de los anillos rojos en la articulación de las patas, visibles de cerca. Es territorial y agresiva, persigue a otras aves en el agua. Puede correr sobre la superficie del agua batiendo las alas antes de levantar vuelo.",sprites:{adulto:"Fulica_armillata_D"},audio_ebird_code:"rbnco1"},
{id:17,num:"#017",nombre_comun:"Chajá",nombre_cientifico:"Chauna torquata",familia:"Anhimidae",orden:"Anseriformes",descripcion:{adulto:"Ave grande y robusta. Cabeza gris pálido con cresta gris desgreñada. Pico pequeño rojo-anaranjado. Ojo rojo con anillo ocular rojo. Fino collar blanco sobre collar negro angosto alrededor del cuello. Cuerpo y alas azul-gris con escamado pálido en el pecho. Partes inferiores gris-blancuzco. Patas largas salmón-rosadas con uñas negras."},habitat:["humedal","pastizal","ribereño"],residencia:"permanente",tamanio:"grande",largo_cm:85,envergadura_cm:170,estado:"LC",provincias:["Buenos Aires","CABA","Santa Fe","Entre Ríos","Corrientes","Misiones","Chaco","Formosa","Santiago del Estero","Córdoba","La Pampa","Tucumán","Salta","Jujuy"],curiosidades:"Tiene un llamado muy potente que puede escucharse a varios kilómetros. A pesar de su tamaño es un gran volador y puede planear durante horas en corrientes de aire. Posee dos espolones óseos en cada ala que usa para defenderse.",sprites:{adulto:"Chauna_torquata_D"},audio_ebird_code:"sousc1"},
{id:18,num:"#018",nombre_comun:"Pato maicero",nombre_cientifico:"Anas georgica",familia:"Anatidae",orden:"Anseriformes",descripcion:{adulto:"Pato mediano de aspecto esbelto. Cabeza parda con corona oscura y una ceja pálida apenas insinuada. Cuello largo y fino. Cuerpo pardo claro con escamado oscuro en el dorso y los flancos. Especulum alar negro con borde posterior blanco visible en vuelo. Vientre ante pálido. Pico largo, negro con franja amarilla lateral característica. Patas grises. Sexos similares."},habitat:["humedal","laguna","ribereño","agrícola"],residencia:"permanente",tamanio:"mediano",largo_cm:55,envergadura_cm:85,estado:"LC",provincias:["Buenos Aires","CABA","Santa Fe","Entre Ríos","Corrientes","Misiones","Chaco","Formosa","Santiago del Estero","Córdoba","La Pampa","Mendoza","San Luis","Tucumán","Salta","Jujuy","Catamarca","La Rioja","San Juan","Neuquén","Río Negro"],curiosidades:"Es uno de los patos más comunes de la región pampeana. Se alimenta de semillas, gramíneas y granos en campos agrícolas, de ahí su nombre. Forma grandes bandadas fuera de la época reproductiva.",sprites:{adulto:"Anas_georgica_D"},audio_ebird_code:"yebpin"},
{id:19,num:"#019",nombre_comun:"Jacana",nombre_cientifico:"Jacana jacana",familia:"Jacanidae",orden:"Charadriiformes",descripcion:{adulto:"Ave mediana inconfundible. Cabeza y cuello negros. Cuerpo castaño-rojizo intenso. Frente con un escudo frontal amarillo-anaranjado brillante muy llamativo. Alas con puntas amarillas visibles en vuelo. Pico amarillo con escudo frontal del mismo color. Patas y dedos extremadamente largos y delgados, grises, que le permiten caminar sobre la vegetación flotante."},habitat:["humedal","laguna"],residencia:"permanente",tamanio:"mediano",largo_cm:23,envergadura_cm:40,estado:"LC",provincias:["Buenos Aires","CABA","Santa Fe","Entre Ríos","Corrientes","Misiones","Chaco","Formosa"],curiosidades:"Camina sobre hojas de plantas flotantes gracias a sus dedos excepcionalmente largos que distribuyen su peso. Es una especie poliándrica — la hembra mantiene un territorio con varios machos que se encargan de incubar los huevos y cuidar los pichones.",sprites:{adulto:"Jacana_jacana_D"},audio_ebird_code:"wattan1"},
{id:20,num:"#020",nombre_comun:"Garza bruja",nombre_cientifico:"Nycticorax nycticorax",familia:"Ardeidae",orden:"Pelecaniformes",descripcion:{adulto:"Garza mediana y robusta de aspecto compacto. Corona y dorso negro-verdosos brillantes. Alas y cola grises. Cara y partes inferiores blancas o gris muy pálido. Dos o tres plumas blancas largas y finas cuelgan de la nuca en época reproductiva. Ojo rojo vivo y llamativo. Pico robusto y negro. Patas amarillo-verdosas. En juvenil el plumaje es pardo rayado con manchas blancas.",juvenil:"Plumaje pardo con manchas y rayas blancas en dorso y alas. Partes inferiores blancuzcas con rayas pardas. Ojo amarillo."},habitat:["humedal","ribereño","laguna"],residencia:"permanente",tamanio:"mediano",largo_cm:60,envergadura_cm:112,estado:"LC",provincias:["Buenos Aires","CABA","Santa Fe","Entre Ríos","Corrientes","Misiones","Chaco","Formosa","Santiago del Estero","Córdoba","La Pampa","Mendoza","San Luis","Tucumán","Salta","Jujuy","Catamarca","La Rioja","San Juan","Neuquén","Río Negro"],curiosidades:"De hábitos principalmente nocturnos y crepusculares, de ahí su nombre. Durante el día descansa en grupos en árboles sobre el agua. Su canto es un 'quack' ronco que se escucha al anochecer. El juvenil es tan diferente del adulto que durante mucho tiempo se lo describió como una especie separada.",sprites:{adulto:"Nycticorax_nycticorax_D",juvenil:"Nycticorax_nycticorax_J"},audio_ebird_code:"blcnig"},
{id:21,num:"#021",nombre_comun:"Carancho",nombre_cientifico:"Caracara plancus",familia:"Falconidae",orden:"Falconiformes",descripcion:{adulto:"Ave grande y robusta. Corona negra con cresta achatada característica. Cara y cera rosada a anaranjada muy llamativa. Nuca y garganta color crema. Pecho y manto finamente barrado en negro y blanco. Alas y vientre pardo oscuro. Cola blanca con banda terminal negra. Patas amarillas. Pico gris-azulado con cera rosada-anaranjada.",juvenil:"Corona marrón. Pecho y manto superior estriados de color ante sobre marrón. Alas y vientre de un marrón más pálido que el adulto."},habitat:["pastizal","agrícola","urbano","ribereño","monte"],residencia:"permanente",tamanio:"grande",largo_cm:60,envergadura_cm:120,estado:"LC",provincias:["Buenos Aires","CABA","Santa Fe","Entre Ríos","Corrientes","Misiones","Chaco","Formosa","Santiago del Estero","Córdoba","La Pampa","Mendoza","San Luis","Tucumán","Salta","Jujuy","Neuquén","Río Negro","Chubut","Santa Cruz","Tierra del Fuego"],curiosidades:"Aunque se alimenta principalmente de carroña, también es capaz de atacar y matar presas de buen tamaño. Es común verlo caminando por el suelo en rutas y campos. Suele robar presas a otras aves rapaces.",sprites:{adulto:"Caracara_plancus_D",juvenil:"Caracara_plancus_J",vuelo:"Caracara_plancus_V"},audio_ebird_code:"crecha"},
{id:22,num:"#022",nombre_comun:"Chimango",nombre_cientifico:"Daptrius chimango",familia:"Falconidae",orden:"Falconiformes",descripcion:{adulto:"Rapaz chica y esbelta. Plumaje pardo con variaciones. Partes superiores pardo oscuro con manchas más claras. Partes inferiores ante pálido con estrías pardas en el pecho. Cola barrada con banda subterminal oscura y punta blancuzca. Base de las primarias blancuzca visible en vuelo. Pico gris con cera amarilla. Patas amarillas. Juvenil más oscuro y rayado."},habitat:["pastizal","agrícola","urbano","ribereño"],residencia:"permanente",tamanio:"mediano",largo_cm:38,envergadura_cm:76,estado:"LC",provincias:["Buenos Aires","CABA","Santa Fe","Entre Ríos","Corrientes","Misiones","Chaco","Formosa","Santiago del Estero","Córdoba","La Pampa","Mendoza","San Luis","Tucumán","Salta","Jujuy","Catamarca","La Rioja","San Juan","Neuquén","Río Negro"],curiosidades:"El carroñero más común de la pampa. Oportunista por excelencia: come carroña, insectos, frutos, huevos y cualquier resto disponible. Es frecuente verlo caminando por el suelo en campos y basurales. A diferencia del carancho, rara vez caza presas vivas.",sprites:{adulto:"Daptrius_chimango_D"},audio_ebird_code:"chiman1"},
{id:23,num:"#023",nombre_comun:"Gavilán mixto",nombre_cientifico:"Parabuteo unicinctus",familia:"Accipitridae",orden:"Accipitriformes",descripcion:{adulto:"Rapaz grande y robusta. Plumaje principalmente negro oscuro. Hombros y muslos de un castaño-rojizo intenso y llamativo. Base y punta de la cola blancas, con el resto negro. En vuelo se aprecia claramente esta combinación de negro, castaño y blanco. Pico negro con cera amarilla. Patas amarillas fuertes. La hembra es notablemente más grande que el macho."},habitat:["pastizal","monte","agrícola"],residencia:"permanente",tamanio:"grande",largo_cm:56,envergadura_cm:113,estado:"LC",provincias:["Buenos Aires","CABA","Santa Fe","Entre Ríos","Corrientes","Chaco","Formosa","Santiago del Estero","Córdoba","La Pampa","Mendoza","San Luis","Tucumán","Salta","Jujuy"],curiosidades:"Caza en grupos cooperativos de dos o más individuos, coordinando el ataque para acorralar a presas grandes como liebres o ñandúes jóvenes. Esta conducta es inusual entre las rapaces y lo convierte en uno de los pocos halconiformes con caza social.",sprites:{adulto:"Parabuteo_unicinctus_D"},audio_ebird_code:"hrihaw"},
{id:24,num:"#024",nombre_comun:"Halconcito colorado",nombre_cientifico:"Falco sparverius",familia:"Falconidae",orden:"Falconiformes",descripcion:{macho:"El halcón más chico de la región. Macho muy colorido. Corona azul-grisácea con mancha central rufa. Cara blanca con dos bigoteras negras características. Dorso rufo con barras negras. Alas azul-grises. Cola rufa con banda subterminal negra y punta blanca. Pecho y vientre ante con manchas negras redondas. Pico gris con cera amarilla. Patas amarillas.",hembra:"Dorso rufo con barras negras al igual que el macho. Alas pardas barradas. Sin el azul-gris del macho. Partes inferiores ante con rayas pardas. Cola rufa barrada."},habitat:["pastizal","agrícola","urbano","monte"],residencia:"permanente",tamanio:"chico",largo_cm:27,envergadura_cm:55,estado:"LC",provincias:["Buenos Aires","CABA","Santa Fe","Entre Ríos","Corrientes","Misiones","Chaco","Formosa","Santiago del Estero","Córdoba","La Pampa","Mendoza","San Luis","Tucumán","Salta","Jujuy","Catamarca","La Rioja","San Juan","Neuquén","Río Negro"],curiosidades:"Caza desde perchas elevadas o en vuelo cernido, detectando insectos y pequeños vertebrados. Es capaz de ver en el ultravioleta, lo que le permite seguir los rastros de orina de roedores. El macho y la hembra difieren notablemente en plumaje, siendo el macho mucho más colorido.",sprites:{macho:"Falco_sparverius_M",hembra:"Falco_sparverius_F"},audio_ebird_code:"amekes"},
{id:25,num:"#025",nombre_comun:"Flamenco austral",nombre_cientifico:"Phoenicopterus chilensis",familia:"Phoenicopteridae",orden:"Phoenicopteriformes",descripcion:{adulto:"Ave grande e inconfundible. Plumaje rosado pálido con las alas rosado-rojo intenso y negro en las primarias. Cuello muy largo y flexible. Pico abultado y curvado hacia abajo, de color rosado con la mitad distal negra. Patas largas grisáceas con articulaciones rosadas. Los juveniles son grises parduzcos. La coloración rosada proviene de los pigmentos de los crustáceos que consume."},habitat:["laguna","costa","humedal"],residencia:"estival",tamanio:"grande",largo_cm:110,envergadura_cm:145,estado:"NT",provincias:["Buenos Aires","CABA","Santa Fe","Entre Ríos","La Pampa","Mendoza","San Luis","Neuquén","Río Negro","Chubut","Santa Cruz"],curiosidades:"Se alimenta filtrando agua con el pico invertido, atrapando algas y pequeños crustáceos. Forma colonias reproductivas en salares y lagunas saladas. Su color rosado depende directamente de la dieta — en cautiverio sin carotenoides en la comida se vuelve blanco.",sprites:{adulto:"Phoenicopterus_chilensis_D"},audio_ebird_code:"chifl1"},
{id:26,num:"#026",nombre_comun:"Torcaza",nombre_cientifico:"Zenaida auriculata",familia:"Columbidae",orden:"Columbiformes",descripcion:{adulto:"Paloma mediana y esbelta. Cabeza gris azulada con dos manchas negras en la cara — una debajo del ojo y otra en la mejilla. Cuello con irisaciones rosado-violáceas. Dorso pardo-grisáceo. Alas con manchas negras dispersas. Pecho rosado que se funde con el vientre más pálido. Cola larga y graduada, gris con bordes blancos en las plumas externas. Pico oscuro. Patas rojas."},habitat:["pastizal","agrícola","urbano","monte"],residencia:"permanente",tamanio:"mediano",largo_cm:28,envergadura_cm:45,estado:"LC",provincias:["Buenos Aires","CABA","Santa Fe","Entre Ríos","Corrientes","Misiones","Chaco","Formosa","Santiago del Estero","Córdoba","La Pampa","Mendoza","San Luis","Tucumán","Salta","Jujuy","Catamarca","La Rioja","San Juan","Neuquén","Río Negro"],curiosidades:"Una de las aves más abundantes de la región pampeana. Forma bandadas enormes — a veces de miles de individuos — en campos agrícolas donde puede causar daños en cultivos de girasol y sorgo. Es una especie cinegética muy cazada en Argentina.",sprites:{adulto:"Zenaida_auriculata_D"},audio_ebird_code:"eardov"},
{id:27,num:"#027",nombre_comun:"Chiflón",nombre_cientifico:"Syrigma sibilatrix",familia:"Ardeidae",orden:"Pelecaniformes",descripcion:{adulto:"Garza mediana de aspecto elegante. Cabeza con corona y cresta negras bien definidas. Cara azul celeste desnuda y brillante en época reproductiva. Cuello rufo-canela intenso. Dorso y alas gris perla. Partes inferiores blancas o ante muy pálido. Pico largo y recto, amarillo con punta oscura. Patas amarillas. Emite un silbido agudo y penetrante característico."},habitat:["pastizal","agrícola","humedal"],residencia:"permanente",tamanio:"mediano",largo_cm:53,envergadura_cm:95,estado:"LC",provincias:["Buenos Aires","CABA","Santa Fe","Entre Ríos","Corrientes","Misiones","Chaco","Formosa","Santiago del Estero","Córdoba","La Pampa","Tucumán","Salta","Jujuy"],curiosidades:"A diferencia de la mayoría de las garzas, prefiere los pastizales secos y campos abiertos al borde del agua. Su canto es un silbido muy agudo y fuerte, escuchable a gran distancia, que da origen a su nombre vulgar.",sprites:{adulto:"Syrigma_sibilatrix_D"},audio_ebird_code:"whiher1"},
{id:28,num:"#028",nombre_comun:"Lechucita de las vizcacheras",nombre_cientifico:"Athene cunicularia",familia:"Strigidae",orden:"Strigiformes",descripcion:{adulto:"Lechuza chica y terrícola. Cara redonda sin discos faciales marcados. Partes superiores pardo con manchas y barras blancas. Partes inferiores blancuzcas con barras pardas en el pecho. Ceja blanca. Ojos amarillos grandes y expresivos orientados hacia adelante. Patas largas para un estrigido, pardas con algo de plumaje en la base. Pico gris amarillento. Frecuentemente vista de día parada en el suelo o en postes."},habitat:["pastizal","agrícola","urbano"],residencia:"permanente",tamanio:"chico",largo_cm:23,envergadura_cm:54,estado:"LC",provincias:["Buenos Aires","CABA","Santa Fe","Entre Ríos","Corrientes","Misiones","Chaco","Formosa","Santiago del Estero","Córdoba","La Pampa","Mendoza","San Luis","Tucumán","Salta","Jujuy","Catamarca","La Rioja","San Juan","Neuquén","Río Negro"],curiosidades:"Nidifica en cuevas en el suelo, generalmente en vizcacheras abandonadas o túneles que excava ella misma. Es de actividad diurna y crepuscular, a diferencia de la mayoría de las lechuzas. Cuando se siente amenazada hace una reverencia repetida muy característica.",sprites:{adulto:"Athene_cunicularia_D"},audio_ebird_code:"burowl"},
{id:29,num:"#029",nombre_comun:"Gaviota capucho café",nombre_cientifico:"Chroicocephalus maculipennis",familia:"Laridae",orden:"Charadriiformes",descripcion:{adulto:"Gaviota mediana y esbelta. En plumaje reproductivo tiene una capucha chocolate-café que cubre la cabeza hasta el cuello. Fuera de época reproductiva la capucha desaparece y la cabeza es blanca con una mancha oscura detrás del ojo. Cuerpo blanco. Alas grises con borde anterior blanco y punta negra. Cola blanca. Pico y patas rojos. La más común en costas y ríos de la región.",reproductivo:"Con capucha chocolate-café completa cubriendo cabeza y nuca."},habitat:["costa","ribereño","humedal","urbano"],residencia:"permanente",tamanio:"mediano",largo_cm:37,envergadura_cm:88,estado:"LC",provincias:["Buenos Aires","CABA","Santa Fe","Entre Ríos","Corrientes","Neuquén","Río Negro","Chubut"],curiosidades:"Es la gaviota más abundante en el Río de la Plata y costas bonaerenses. Muy oportunista, sigue barcos y barcazas para aprovechar los descartes. Forma grandes colonias reproductivas en islas del Delta del Paraná.",sprites:{adulto:"Chroicocephalus_maculipennis_D",reproductivo:"Chroicocephalus_maculipennis_R"},audio_ebird_code:"brhgul1"},
{id:30,num:"#030",nombre_comun:"Gaviota cocinera",nombre_cientifico:"Larus dominicanus",familia:"Laridae",orden:"Charadriiformes",descripcion:{adulto:"La gaviota más grande de la región. Adulto con cabeza, cuello, pecho y vientre blancos. Dorso y alas gris oscuro casi negro. Puntas de las alas negras con manchas blancas. Cola blanca. Pico amarillo robusto con mancha roja en el gonys. Ojo amarillo con anillo orbital rojo. Patas amarillas. El juvenil es pardo moteado y tarda cuatro años en adquirir el plumaje adulto.",juvenil:"Plumaje pardo moteado con escamado en dorso y alas. Pico oscuro. Patas rosadas. Cola con banda subterminal oscura."},habitat:["costa","marino","ribereño","urbano"],residencia:"permanente",tamanio:"grande",largo_cm:58,envergadura_cm:128,estado:"LC",provincias:["Buenos Aires","CABA","Santa Fe","Entre Ríos","Neuquén","Río Negro","Chubut","Santa Cruz","Tierra del Fuego"],curiosidades:"Carroñera y predadora oportunista. En costas patagónicas depreda colonias de pingüinos y lobos marinos, picoteando heridas en los adultos. Su nombre 'cocinera' se debe a que solía seguir a los barcos pesqueros para aprovechar los descartes.",sprites:{adulto:"Larus_dominicanus_D",juvenil:"Larus_dominicanus_J"},audio_ebird_code:"kelbgul"}
];
let sel=null,tab={},flt=null;
function isWide(k){return WIDE.includes(k);}
function isA(t,v){return flt&&flt.t===t&&flt.v===v;}
function tog(t,v){flt=isA(t,v)?null:{t,v};render();}
let lbSprites=[];let lbIdx=0;
function openLb(src){
  if(!sel)return;
  const b=birds.find(x=>x.id===sel);
  lbSprites=Object.entries(b.sprites).map(([k,v])=>({label:k,sk:v,src:SP[v]||''}));
  lbIdx=lbSprites.findIndex(x=>x.src===src);
  if(lbIdx<0)lbIdx=0;
  lbRender();
  document.getElementById('lb').classList.add('open');
}
function lbRender(){
  const item=lbSprites[lbIdx];
  document.getElementById('lb-img').src=item.src;
  document.getElementById('lb-label').textContent=item.label+(lbSprites.length>1?' ('+(lbIdx+1)+'/'+lbSprites.length+')':'');
  document.getElementById('lb-prev').disabled=lbIdx===0;
  document.getElementById('lb-next').disabled=lbIdx===lbSprites.length-1;
  const sex=item.sk.endsWith('_M')?'♂':item.sk.endsWith('_F')?'♀':'';
  document.getElementById('lb-sex').textContent=sex;
}
function lbNav(dir){
  const next=lbIdx+dir;
  if(next>=0&&next<lbSprites.length){lbIdx=next;lbRender();}
}
function closeLb(){document.getElementById('lb').classList.remove('open');}

function getSorted(list){
  const s=(document.getElementById('sort')||{value:'num'}).value;
  return [...list].sort((a,b)=>s==='nombre'?a.nombre_comun.localeCompare(b.nombre_comun,'es'):s==='cientifico'?a.nombre_cientifico.localeCompare(b.nombre_cientifico):a.id-b.id);
}

function getFiltered(){
  let list=birds;
  if(flt){const{t,v}=flt;list=list.filter(b=>t==='habitat'?b.habitat.includes(v):t==='provincia'?b.provincias.includes(v):t==='estado'?b.estado===v:t==='tamanio'?b.tamanio===v:t==='familia'?b.familia===v:t==='orden'?b.orden===v:t==='residencia'?b.residencia===v:true);}
  const q=(document.getElementById('search')||{value:''}).value.toLowerCase();
  if(q)list=list.filter(b=>b.nombre_comun.toLowerCase().includes(q)||b.nombre_cientifico.toLowerCase().includes(q)||b.familia.toLowerCase().includes(q)||b.orden.toLowerCase().includes(q));
  return getSorted(list);
}

function pick(id){sel=id;const b=birds.find(x=>x.id===id);if(!tab[id])tab[id]=Object.keys(b.sprites)[0];render();scrollToDetail();}
function st(id,t){tab[id]=t;render();}
function cls(){sel=null;render();}

function navBird(dir){
  const list=getFiltered();
  const idx=list.findIndex(b=>b.id===sel);
  if(idx===-1)return;
  const next=list[idx+dir];
  if(next)pick(next.id);
}

function scrollToDetail(){
  setTimeout(()=>{window.scrollTo({top:0,behavior:'smooth'});},50);
}

document.addEventListener('keydown',e=>{
  const lbOpen=document.getElementById('lb').classList.contains('open');
  if(e.key==='Escape'){if(lbOpen){closeLb();}else{cls();}}
  if(lbOpen){
    if(e.key==='ArrowRight')lbNav(1);
    if(e.key==='ArrowLeft')lbNav(-1);
    return;
  }
  if(sel!==null){
    if(e.key==='ArrowRight'||e.key==='ArrowDown'){e.preventDefault();navBird(1);}
    if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();navBird(-1);}
  }
});

function iTag(code,c){const r=isA('estado',code)?' active-ring':'';const cl=c?` onclick="tog('estado','${code}')" class="tag iucn-${code} clickable${r}"`:` class="tag iucn-${code}${r}"`;return `<span${cl}>${code}</span>`;}
function fTag(t,v,cls){const r=isA(t,v)?' active-ring':'';return `<span class="tag ${cls} clickable${r}" onclick="tog('${t}','${v}')">${v}</span>`;}

function render(){
  const list=getFiltered();
  document.getElementById('subtitle').textContent=`${birds.length} especies`;
  let h='';
  if(flt)h+=`<div class="breadcrumb"><span>Filtrando por</span><span class="bc-tag">${flt.t}: ${flt.v}</span><button class="bc-close" onclick="flt=null;render()">&#10005;</button><span>${list.length} ${list.length===1?'ave':'aves'}</span></div>`;

  if(sel){
    const b=birds.find(x=>x.id===sel);
    const t=tab[b.id]||Object.keys(b.sprites)[0];
    const sk=b.sprites[t];
    const imgSrc=SP[sk]||'';
    const sexMain=sk.endsWith('_M')?'<span class="sex-badge">&#9794;</span>':sk.endsWith('_F')?'<span class="sex-badge">&#9792;</span>':'';
    const wide=isWide(t);
    const idx=list.findIndex(x=>x.id===sel);
    const hasPrev=idx>0;
    const hasNext=idx<list.length-1;
    h+=`<div class="detail">
      <div class="detail-top">
        <div class="sprite-col">
          <div class="sprite-main${wide?' wide':''}" onclick="openLb('${imgSrc}')" title="Ver ampliado">
            <div class="sprite-wrap">
              ${imgSrc?`<img src="${imgSrc}" alt="${t}">`:'<span style="font-size:11px;color:#888780">pendiente</span>'}
              ${sexMain}
            </div>
          </div>
          <div class="sprite-thumbs">
            ${Object.entries(b.sprites).map(([tt,sk])=>`<div class="thumb${isWide(tt)?' wide':''}${t===tt?' active':''}" onclick="st(${b.id},'${tt}')" title="${tt}"><img src="${SP[sk]||''}" alt="${tt}">${sk.endsWith('_M')?'<span class="thumb-sex">&#9794;</span>':sk.endsWith('_F')?'<span class="thumb-sex">&#9792;</span>':''}<span class="thumb-lbl">${tt}</span></div>`).join('')}
          </div>
        </div>
        <div class="detail-info">
          <div class="d-header">
            <div class="d-titles">
              <div class="d-name">${b.nombre_comun}</div>
              <div class="d-sci">${b.nombre_cientifico}</div>
            </div>
            <div class="nav-btns">
              <button class="nav-btn" onclick="navBird(-1)" ${hasPrev?'':'disabled'} title="Anterior (&#8592;)">&#8592;</button>
              <span style="font-size:11px;color:#888780;min-width:32px;text-align:center">${idx+1}/${list.length}</span>
              <button class="nav-btn" onclick="navBird(1)" ${hasNext?'':'disabled'} title="Siguiente (&#8594;)">&#8594;</button>
              <button class="close-btn" onclick="cls()" title="Cerrar">&#10005;</button>
            </div>
          </div>
          <div class="meta-grid">
            <div class="meta"><div class="meta-lbl">Familia</div><div class="meta-val clickable" onclick="tog('familia','${b.familia}')">${b.familia}</div></div>
            <div class="meta"><div class="meta-lbl">Orden</div><div class="meta-val clickable" onclick="tog('orden','${b.orden}')">${b.orden}</div></div>
            <div class="meta"><div class="meta-lbl">Estado</div><div class="meta-val">${iTag(b.estado,true)}</div></div>
            <div class="meta"><div class="meta-lbl">Tamaño</div><div class="meta-val clickable" onclick="tog('tamanio','${b.tamanio}')">${b.tamanio}</div></div>
            <div class="meta"><div class="meta-lbl">Largo</div><div class="meta-val">${b.largo_cm} cm</div></div>
            ${b.envergadura_cm?`<div class="meta"><div class="meta-lbl">Envergadura</div><div class="meta-val">${b.envergadura_cm} cm</div></div>`:''}
          </div>
          ${Object.entries(b.descripcion).map(([k,v])=>`<div class="desc-lbl">${k}</div><div class="desc-txt">${v}</div>`).join('')}
        </div>
      </div>
      <div class="sec-ttl">Hábitat</div>
      <div class="tags" style="margin-bottom:10px">${b.habitat.map(h=>fTag('habitat',h,HC[h]||'tag')).join('')}</div>
      <div class="sec-ttl">Residencia</div>
      <div class="tags" style="margin-bottom:10px">${fTag('residencia',b.residencia,RC[b.residencia]||'tag')}</div>
      <div class="sec-ttl">Provincias</div>
      <div class="provs">${b.provincias.map(p=>`<span class="prov${isA('provincia',p)?' prov-active':''}" onclick="tog('provincia','${p}')">${p}</span>`).join('')}</div>
      <div class="sec-ttl">Curiosidades</div>
      <div class="curiosidades">${b.curiosidades}</div>
    </div>`;
  }

  if(!list.length)h+='<div class="empty">No se encontraron aves con ese criterio.</div>';
  else{
    h+='<div class="grid">';
    h+=list.map(b=>{const k0=Object.keys(b.sprites)[0];const sk0=b.sprites[k0];const src=SP[sk0]||'';const badge0=sk0.endsWith('_M')?'<span class="sex-badge">&#9794;</span>':sk0.endsWith('_F')?'<span class="sex-badge">&#9792;</span>':'';return `<div class="card${sel===b.id?' active':''}" onclick="pick(${b.id})"><div class="card-img">${src?`<div class="sprite-wrap"><img src="${src}" alt="${b.nombre_comun}">${badge0}</div>`:''}</div><div class="card-body"><div class="card-num">${b.num}</div><div class="card-name">${b.nombre_comun}</div><div class="card-sci">${b.nombre_cientifico}</div><div class="tags">${iTag(b.estado,false)}<span class="tag ${TC[b.tamanio]}">${b.tamanio}</span></div></div></div>`;}).join('');
    h+='</div>';
  }
  document.getElementById('app').innerHTML=h;
}
render();
</script>
</body>
</html>
