<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aviario Bonaerense</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1D9E75">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f4f0;color:#1a1a18;min-height:100vh}
@media(prefers-color-scheme:dark){body{background:#1a1a18;color:#f0ede4}}
.header{padding:1.25rem 1.5rem 0.75rem;border-bottom:0.5px solid rgba(0,0,0,0.1);background:#fff}
@media(prefers-color-scheme:dark){.header{background:#242420;border-color:rgba(255,255,255,0.08)}}
.logo{font-size:22px;font-weight:500}.logo span{color:#1D9E75}
.subtitle{font-size:12px;color:#888780;margin-top:2px}
.toolbar{display:flex;gap:8px;align-items:center;padding:0.75rem 1.5rem;border-bottom:0.5px solid rgba(0,0,0,0.08);background:#fff;flex-wrap:wrap}
@media(prefers-color-scheme:dark){.toolbar{background:#242420;border-color:rgba(255,255,255,0.06)}}
.toolbar input{flex:1;min-width:150px;padding:7px 10px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.15);background:#f5f4f0;font-size:13px;font-family:inherit;color:#1a1a18;outline:none}
@media(prefers-color-scheme:dark){.toolbar input{background:#1a1a18;border-color:rgba(255,255,255,0.1);color:#f0ede4}}
.toolbar select{padding:7px 10px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.15);background:#f5f4f0;font-size:13px;font-family:inherit;color:#1a1a18;cursor:pointer;outline:none}
@media(prefers-color-scheme:dark){.toolbar select{background:#1a1a18;border-color:rgba(255,255,255,0.1);color:#f0ede4}}
.sort-lbl{font-size:12px;color:#888780;white-space:nowrap}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;padding:1.25rem 1.5rem}
.card{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color 0.15s,transform 0.1s}
@media(prefers-color-scheme:dark){.card{background:#2c2c28;border-color:rgba(255,255,255,0.08)}}
.card:hover{border-color:rgba(0,0,0,0.3);transform:translateY(-1px)}
.card.active{border:1.5px solid #1D9E75}
.card-img{width:100%;aspect-ratio:1/1;background:#f1efe8;display:flex;align-items:center;justify-content:center;overflow:hidden}
@media(prefers-color-scheme:dark){.card-img{background:#1f1f1c}}
.card-img img{max-width:100%;max-height:100%;object-fit:contain;image-rendering:pixelated;image-rendering:crisp-edges}
.card-body{padding:10px 12px 12px}
.card-num{font-size:11px;color:#888780;margin-bottom:2px}
.card-name{font-size:14px;font-weight:500;margin-bottom:3px}
.card-sci{font-size:11px;color:#888780;font-style:italic;margin-bottom:8px}
.tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{font-size:10px;padding:2px 7px;border-radius:10px;cursor:default}
.tag.clickable{cursor:pointer}
.iucn-LC{background:#EAF3DE;color:#27500A}
@media(prefers-color-scheme:dark){.iucn-LC{background:#173404;color:#C0DD97}}
.hab-humedal{background:#E6F1FB;color:#0C447C}.hab-ribere{background:#E1F5EE;color:#085041}
.hab-costa{background:#EEEDFE;color:#3C3489}.hab-pastizal{background:#EAF3DE;color:#27500A}
.hab-agricola{background:#FAEEDA;color:#633806}.hab-urbano{background:#F1EFE8;color:#444441}
.hab-monte{background:#FAECE7;color:#712B13}.hab-bosque{background:#E8F5E0;color:#1A4D0A}
.hab-aereo{background:#F0EEFB;color:#3D2D8A}.hab-laguna{background:#E6F1FB;color:#0C447C}
.tam-chico{background:#F0EEFB;color:#3D2D8A}.tam-mediano{background:#FFF0E0;color:#7A4010}
.tam-grande{background:#FCEBEB;color:#791F1F}
.res-permanente{background:#E1F5EE;color:#085041}.res-estival{background:#FAEEDA;color:#633806}
@media(prefers-color-scheme:dark){
  .hab-humedal{background:#042C53;color:#B5D4F4}.hab-ribere{background:#04342C;color:#9FE1CB}
  .hab-costa{background:#26215C;color:#CECBF6}.hab-pastizal{background:#173404;color:#C0DD97}
  .hab-agricola{background:#412402;color:#FAC775}.hab-urbano{background:#2C2C2A;color:#D3D1C7}
  .hab-monte{background:#4A1B0C;color:#F5C4B3}.hab-bosque{background:#0D2E04;color:#A8D88A}
  .hab-aereo{background:#1E1640;color:#C5BCEF}.hab-laguna{background:#042C53;color:#B5D4F4}
  .tam-chico{background:#1E1640;color:#C5BCEF}.tam-mediano{background:#3D2000;color:#F5C090}
  .tam-grande{background:#501313;color:#F7C1C1}
  .res-permanente{background:#04342C;color:#9FE1CB}.res-estival{background:#412402;color:#FAC775}
}
.detail{background:#fff;border-top:0.5px solid rgba(0,0,0,0.1);padding:1.25rem}
@media(prefers-color-scheme:dark){.detail{background:#2c2c28;border-color:rgba(255,255,255,0.08)}}
.detail-top{display:flex;gap:1.25rem;margin-bottom:1rem;flex-wrap:wrap}
.sprite-col{display:flex;flex-direction:column;align-items:center;gap:8px;flex-shrink:0}
.sprite-main{width:150px;height:150px;background:#f1efe8;border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:zoom-in}
@media(prefers-color-scheme:dark){.sprite-main{background:#1f1f1c}}
.sprite-main.wide{width:220px;height:130px}
.sprite-main img{max-width:100%;max-height:100%;object-fit:contain;image-rendering:pixelated;image-rendering:crisp-edges}
.sprite-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;width:100%;height:100%}
.sex-badge{position:absolute;top:4px;right:5px;font-size:13px;font-weight:700;color:#333;line-height:1;pointer-events:none;text-shadow:0 0 3px #fff,0 0 3px #fff,0 0 3px #fff}
.grid-controls{display:flex;gap:6px;padding:8px 1.5rem 4px;align-items:center}
.sex-toggle{display:inline-flex;border-radius:20px;border:1.5px solid #d8d5cc;overflow:hidden;background:#f1efe8}
.sex-toggle button{padding:4px 12px;border:none;border-radius:0;background:transparent;font-size:13px;font-family:inherit;cursor:pointer;color:#555;transition:background 0.15s,color 0.15s;line-height:1.4}
.sex-toggle button.on{background:#1D9E75;color:#fff;font-weight:600}
.sprite-thumbs{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:220px}
.thumb-wrap{display:flex;flex-direction:column;align-items:center;gap:2px}
.thumb{width:44px;height:44px;background:#f1efe8;border-radius:8px;border:0.5px solid rgba(0,0,0,0.1);cursor:pointer;overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative}
@media(prefers-color-scheme:dark){.thumb{background:#1f1f1c;border-color:rgba(255,255,255,0.08)}}
.thumb.wide{width:64px;height:40px}.thumb.active{border:1.5px solid #1D9E75}
.thumb img{max-width:100%;max-height:100%;object-fit:contain;image-rendering:pixelated;image-rendering:crisp-edges}
.thumb-sex{position:absolute;top:1px;right:2px;font-size:7px;font-weight:700;color:#333;line-height:1;text-shadow:0 0 2px #fff,0 0 2px #fff}
.thumb-lbl{font-size:8px;color:#888780;text-align:center;line-height:1;padding:0 2px}
.detail-info{flex:1;min-width:200px}
.d-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px}
.d-titles{flex:1}
.d-name{font-size:20px;font-weight:500;margin-bottom:2px}
.d-sci{font-size:13px;font-style:italic;color:#888780}
.nav-btns{display:flex;gap:6px;flex-shrink:0;align-items:center}
.nav-btn{background:#f1efe8;border:0.5px solid rgba(0,0,0,0.12);border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:#444441;transition:background 0.1s}
.nav-btn:hover{background:#e4e2da}
.nav-btn:disabled{opacity:0.3;cursor:default}
@media(prefers-color-scheme:dark){.nav-btn{background:#1f1f1c;border-color:rgba(255,255,255,0.08);color:#b4b2a9}.nav-btn:hover{background:#2c2c28}}
.meta-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.meta{background:#f1efe8;border-radius:8px;padding:8px 10px}
@media(prefers-color-scheme:dark){.meta{background:#1f1f1c}}
.meta-lbl{font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:#888780;margin-bottom:2px}
.meta-val{font-size:13px;font-weight:500}
.meta-val.clickable{cursor:pointer;text-decoration:underline;text-underline-offset:2px;text-decoration-color:rgba(0,0,0,0.2)}
@media(prefers-color-scheme:dark){.meta-val.clickable{text-decoration-color:rgba(255,255,255,0.2)}}
.desc-lbl{font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:#888780;margin-bottom:3px;margin-top:8px}
.desc-txt{font-size:13px;color:#5f5e5a;line-height:1.6}
@media(prefers-color-scheme:dark){.desc-txt{color:#b4b2a9}}
.sec-ttl{font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:#888780;margin:10px 0 6px}
.provs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.prov{font-size:11px;padding:2px 8px;border-radius:10px;background:#f1efe8;color:#5f5e5a;border:0.5px solid rgba(0,0,0,0.1);cursor:pointer}
@media(prefers-color-scheme:dark){.prov{background:#1f1f1c;color:#b4b2a9;border-color:rgba(255,255,255,0.08)}}
.prov.prov-active{outline:1.5px solid #1D9E75}
.curiosidades{font-size:13px;color:#5f5e5a;line-height:1.6;border-left:2px solid #1D9E75;padding-left:12px;margin-top:4px}
@media(prefers-color-scheme:dark){.curiosidades{color:#b4b2a9}}
.close-btn{background:none;border:none;cursor:pointer;font-size:18px;color:#888780;line-height:1;flex-shrink:0}
.breadcrumb{display:flex;align-items:center;gap:8px;padding:0.5rem 1.5rem;font-size:12px;color:#888780;border-bottom:0.5px solid rgba(0,0,0,0.08);background:#fff;flex-wrap:wrap}
@media(prefers-color-scheme:dark){.breadcrumb{background:#2c2c28;border-color:rgba(255,255,255,0.08)}}
.bc-tag{background:#f1efe8;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:500;color:#1a1a18}
@media(prefers-color-scheme:dark){.bc-tag{background:#1f1f1c;color:#f0ede4}}
.bc-close{background:none;border:none;cursor:pointer;color:#888780;font-size:16px;padding:0;line-height:1}
.active-ring{outline:1.5px solid #1D9E75;outline-offset:1px}
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:9999;align-items:center;justify-content:center;cursor:zoom-out}
.lb.open{display:flex}
.lb img{max-width:90vw;max-height:90vh;object-fit:contain;image-rendering:pixelated;image-rendering:crisp-edges;border-radius:4px}
.lb-close{position:fixed;top:1rem;right:1.25rem;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;line-height:1}
.lb-content{display:flex;flex-direction:column;align-items:center;gap:12px;cursor:zoom-out}
.lb-label{font-size:13px;color:rgba(255,255,255,0.7);letter-spacing:0.5px;text-transform:capitalize}
.lb-nav{position:fixed;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.12);border:none;color:#fff;font-size:24px;cursor:pointer;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background 0.15s;z-index:10000}
.lb-nav:hover{background:rgba(255,255,255,0.25)}
.lb-nav:disabled{opacity:0.2;cursor:default}
.lb-prev{left:1.25rem}
.lb-next{right:1.25rem}
.empty{padding:2rem 1.5rem;color:#888780;font-size:14px}
#header-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}
.login-btn{padding:6px 12px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.15);background:#1D9E75;color:#fff;font-size:13px;font-family:inherit;cursor:pointer;white-space:nowrap}
.login-btn:hover{background:#178a65}
.ll-toggle{padding:6px 12px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.15);background:#f1efe8;color:#1a1a18;font-size:13px;font-family:inherit;cursor:pointer;white-space:nowrap;transition:background 0.15s,color 0.15s}
.ll-toggle.on{background:#1D9E75;color:#fff;border-color:#1D9E75}
.trophy-btn{padding:6px 8px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.15);background:#f1efe8;font-size:16px;cursor:pointer;line-height:1}
.user-chip{font-size:12px;color:#888780;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.user-chip:hover{color:#1a1a18}
.ll-unseen img{filter:grayscale(100%) opacity(0.55)}
.seen-badge{position:absolute;top:4px;left:5px;font-size:12px;color:#1D9E75;font-weight:700;line-height:1;text-shadow:0 0 3px #fff,0 0 3px #fff}
.mark-seen-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:1.5px solid #1D9E75;background:transparent;color:#1D9E75;font-size:13px;font-family:inherit;cursor:pointer;font-weight:500;transition:background 0.15s,color 0.15s;margin-top:8px}
.mark-seen-btn.seen{background:#1D9E75;color:#fff}
.mark-seen-btn:hover:not(.seen){background:#f0faf5}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:10000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:1.5rem;width:280px;display:flex;flex-direction:column;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,0.2)}
.modal-title{font-size:18px;font-weight:500}
.modal-sub{font-size:12px;color:#888780;margin-top:-6px}
.modal input{padding:9px 12px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.15);font-size:14px;font-family:inherit;outline:none;background:#f5f4f0;color:#1a1a18}
.modal input:focus{border-color:#1D9E75}
.modal-btn{padding:9px;border-radius:8px;border:none;background:#1D9E75;color:#fff;font-size:14px;font-family:inherit;cursor:pointer;font-weight:500}
.modal-btn:hover{background:#178a65}
.modal-cancel{padding:9px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.12);background:#f1efe8;color:#444;font-size:14px;font-family:inherit;cursor:pointer}
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:10001}
.drawer-overlay.open{display:block}
.drawer{position:fixed;right:0;top:0;bottom:0;width:300px;max-width:90vw;background:#fff;z-index:10002;transform:translateX(100%);transition:transform 0.25s ease;overflow-y:auto;display:flex;flex-direction:column}
.drawer.open{transform:translateX(0)}
.drawer-header{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.25rem 0.75rem;border-bottom:0.5px solid rgba(0,0,0,0.1);position:sticky;top:0;background:#fff;z-index:1}
.drawer-title{font-size:18px;font-weight:500}
.drawer-count{font-size:12px;color:#888780;margin-left:6px}
#trophy-list{padding:0.75rem 1rem;display:flex;flex-direction:column;gap:8px}
.trophy-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:#f5f4f0;opacity:0.38;transition:opacity 0.2s}
.trophy-item.unlocked{opacity:1;background:#f0faf5;border:0.5px solid rgba(29,158,117,0.3)}
.trophy-icon{width:56px;height:56px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.trophy-icon img{width:56px;height:56px;object-fit:contain;image-rendering:pixelated}
.trophy-item.unlocked{cursor:pointer}
.trophy-info{flex:1;min-width:0}
.trophy-name{font-size:13px;font-weight:500;margin-bottom:2px}
.trophy-cond{font-size:11px;color:#888780}
.fam-section-ttl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#888780;font-weight:600;padding:12px 2px 4px}
.fam-row{display:flex;flex-direction:column;gap:5px;padding:8px 10px;border-radius:10px;background:#f5f4f0}
.fam-row-top{display:flex;justify-content:space-between;align-items:center}
.fam-name{font-size:12px;font-weight:500}
.fam-bar-wrap{display:flex;align-items:center;gap:8px}
.fam-bar-bg{flex:1;height:5px;border-radius:3px;background:rgba(0,0,0,0.1);overflow:hidden}
.fam-bar-fill{height:100%;border-radius:3px;background:#1D9E75;transition:width 0.4s}
.fam-pct{font-size:10px;color:#888780;width:26px;text-align:right;white-space:nowrap}
.fam-tiers{display:flex;gap:3px;align-items:center}
.fam-tiers img{width:22px;height:22px;object-fit:contain;image-rendering:pixelated;opacity:0.22}
.fam-tiers img.earned{opacity:1}
.tc-icon img{width:110px;height:110px;object-fit:contain;image-rendering:pixelated}
.trophy-lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:10200;align-items:center;justify-content:center;cursor:zoom-out;flex-direction:column;gap:14px}
.trophy-lb.open{display:flex}
.trophy-lb img{max-width:80vw;max-height:75vh;object-fit:contain;image-rendering:pixelated}
.trophy-lb-name{font-size:15px;color:#fff;font-weight:500;text-align:center}
.trophy-lb-cond{font-size:12px;color:rgba(255,255,255,0.6);text-align:center}
.trophy-cel-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.62);z-index:10100;align-items:center;justify-content:center}
.trophy-cel-overlay.open{display:flex}
.trophy-cel{background:#fff;border-radius:20px;padding:2rem 1.75rem 1.5rem;width:290px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px;box-shadow:0 16px 56px rgba(0,0,0,0.28);animation:tc-pop 0.38s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes tc-pop{from{transform:scale(0.65);opacity:0}to{transform:scale(1);opacity:1}}
.tc-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:#1D9E75;font-weight:700}
.tc-icon{font-size:58px;line-height:1;margin:4px 0}
.tc-name{font-size:20px;font-weight:600;margin-bottom:2px}
.tc-cond{font-size:12px;color:#888780}
.tc-btn{width:100%;padding:10px;border-radius:10px;border:none;background:#1D9E75;color:#fff;font-size:14px;font-family:inherit;cursor:pointer;font-weight:500;margin-top:6px;transition:background 0.15s}
.tc-btn:hover{background:#178a65}
@media(prefers-color-scheme:dark){
  .trophy-cel{background:#2c2c28;color:#f0ede4}
  .tc-cond{color:#888780}
  .modal{background:#2c2c28;color:#f0ede4}
  .modal input{background:#1a1a18;border-color:rgba(255,255,255,0.1);color:#f0ede4}
  .modal-cancel{background:#1f1f1c;color:#b4b2a9;border-color:rgba(255,255,255,0.08)}
  .drawer{background:#242420;color:#f0ede4}
  .drawer-header{background:#242420;border-color:rgba(255,255,255,0.08)}
  .trophy-item{background:#1f1f1c}
  .trophy-item.unlocked{background:#0a2018;border-color:rgba(29,158,117,0.4)}
  .fam-row{background:#1f1f1c}
  .fam-bar-bg{background:rgba(255,255,255,0.1)}
  .ll-toggle{background:#1f1f1c;color:#f0ede4;border-color:rgba(255,255,255,0.08)}
  .ll-toggle.on{background:#1D9E75;color:#fff;border-color:#1D9E75}
  .trophy-btn{background:#1f1f1c;border-color:rgba(255,255,255,0.08)}
  .mark-seen-btn{background:transparent;border-color:#1D9E75;color:#1D9E75}
  .mark-seen-btn.seen{background:#1D9E75;color:#fff}
  .mark-seen-btn:hover:not(.seen){background:#0a2018}
  .user-chip:hover{color:#f0ede4}
}
</style>
</head>
<body>
<div class="header">
  <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
    <div>
      <div class="logo">Aviar<span>io</span> <span style="font-size:13px;font-weight:400;color:#888780">Buenos Aires</span></div>
      <div class="subtitle" id="subtitle">50 especies</div>
    </div>
    <div id="header-actions"></div>
  </div>
</div>
<div class="toolbar">
  <input type="text" id="search" placeholder="Buscar por nombre, familia u orden…" oninput="render()">
  <span class="sort-lbl">Ordenar:</span>
  <select id="sort" onchange="render()">
    <option value="num">Nº de especie</option>
    <option value="nombre">Nombre común A–Z</option>
    <option value="cientifico">Nombre científico A–Z</option>
  </select>
</div>
